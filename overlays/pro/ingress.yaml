apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: golang-example-site
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production-a3v
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/compute-full-forwarded-for: "true"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - site-golang.a3v.me
      secretName: site-golang-pro-tls
  rules:
    - host: site-golang.a3v.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: golang-example-site
                port:
                  number: 80
